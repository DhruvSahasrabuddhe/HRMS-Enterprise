apiVersion: v1
kind: ConfigMap
metadata:
  name: hrms-config
  namespace: hrms
  labels:
    app.kubernetes.io/name: hrms-enterprise
    app.kubernetes.io/component: config
data:
  ASPNETCORE_ENVIRONMENT: "Production"
  ASPNETCORE_URLS: "http://+:8080"
  DOTNET_RUNNING_IN_CONTAINER: "true"

  # Serilog minimum level overrides
  Serilog__MinimumLevel__Default: "Information"
  Serilog__MinimumLevel__Override__Microsoft: "Warning"
  Serilog__MinimumLevel__Override__Microsoft.AspNetCore: "Warning"
  Serilog__MinimumLevel__Override__Microsoft.EntityFrameworkCore: "Warning"
  Serilog__MinimumLevel__Override__System: "Warning"

  # Cache settings
  Cache__DefaultExpirationMinutes: "5"
  Cache__SlidingExpirationMinutes: "2"
  Cache__LongExpirationMinutes: "30"

  # Allowed hosts (override per environment)
  AllowedHosts: "hrms.example.com;hrms-staging.example.com"

  # Application settings
  RUN_MIGRATIONS: "true"
