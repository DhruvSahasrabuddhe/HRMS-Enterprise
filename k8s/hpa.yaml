apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: hrms-web
  namespace: hrms
  labels:
    app.kubernetes.io/name: hrms-enterprise
    app.kubernetes.io/component: web
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: hrms-web

  minReplicas: 3
  maxReplicas: 20

  metrics:
    # Scale on CPU utilisation
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60    # add pods when average CPU > 60 %

    # Scale on memory utilisation
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 70    # add pods when average memory > 70 %

  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60       # wait 60 s before adding more pods
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60                # add at most 2 pods per minute
    scaleDown:
      stabilizationWindowSeconds: 300      # wait 5 min before removing pods
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120               # remove at most 1 pod per 2 minutes
