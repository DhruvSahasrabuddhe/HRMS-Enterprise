# secret.yaml – TEMPLATE ONLY.
# Do NOT store real secrets here.  Values must be base64-encoded.
#
# Populate secrets before deploying:
#
#   kubectl create secret generic hrms-secrets \
#     --namespace hrms \
#     --from-literal=ConnectionStrings__DefaultConnection="Server=..." \
#     --from-literal=ConnectionStrings__Redis="redis:6379" \
#     --from-literal=Encryption__Key="$(openssl rand -hex 32)" \
#     --from-literal=Encryption__IV="$(openssl rand -hex 16)" \
#     --dry-run=client -o yaml | kubectl apply -f -
#
# For production, use an external secrets manager (e.g. Azure Key Vault,
# AWS Secrets Manager, HashiCorp Vault) and the corresponding CSI driver
# rather than storing values in this file.
apiVersion: v1
kind: Secret
metadata:
  name: hrms-secrets
  namespace: hrms
  labels:
    app.kubernetes.io/name: hrms-enterprise
    app.kubernetes.io/component: secrets
type: Opaque
data:
  # Replace with real base64-encoded values
  # echo -n "value" | base64
  ConnectionStrings__DefaultConnection: REPLACE_WITH_BASE64
  ConnectionStrings__Redis:             REPLACE_WITH_BASE64
  Encryption__Key:                      REPLACE_WITH_BASE64
  Encryption__IV:                       REPLACE_WITH_BASE64
